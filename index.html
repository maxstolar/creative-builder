<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mindbox Creative Builder</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, sans-serif; background: #f0f2f5; display: flex; min-height: 100vh; }

#sidebar {
  width: 340px; background: #fff; border-right: 1px solid #e5e5e5;
  padding: 24px 20px; overflow-y: auto; flex-shrink: 0; display: flex; flex-direction: column; gap: 0;
}
.app-title { font-weight: 700; font-size: 15px; margin-bottom: 20px; color: #000; }
.mode-btns { display: flex; gap: 8px; margin-bottom: 24px; }
.mode-btn {
  flex: 1; padding: 9px 0; border-radius: 8px; border: none;
  cursor: pointer; font-size: 13px; font-weight: 600; transition: all .15s;
  background: #f0f0f0; color: #666;
}
.mode-btn.active { background: #000; color: #fff; }

.field { margin-bottom: 14px; }
label { display: block; font-size: 11px; font-weight: 600; color: #999; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .4px; }
input[type=text], textarea, select {
  width: 100%; border: 1px solid #e8e8e8; border-radius: 8px;
  padding: 9px 12px; font-size: 13px; font-family: inherit; color: #000; background: #fafafa;
  transition: border .15s;
}
textarea { resize: vertical; }
input:focus, textarea:focus, select:focus { outline: none; border-color: #aaa; background: #fff; }

.color-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
input[type=color] { width: 38px; height: 34px; border: 1px solid #e8e8e8; border-radius: 6px; cursor: pointer; padding: 2px; background: #fafafa; }
.color-dot { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; flex-shrink: 0; transition: transform .1s; }
.color-dot:hover { transform: scale(1.1); }
.color-dot.active { border-color: #000; }

.tags-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; min-height: 10px; }
.tag-chip { display: flex; align-items: center; gap: 4px; background: #f0f0f0; border-radius: 20px; padding: 5px 10px; font-size: 12px; }
.tag-chip .rm { cursor: pointer; color: #aaa; font-weight: 700; font-size: 14px; line-height: 1; margin-left: 2px; }
.tag-chip .rm:hover { color: #000; }

.dropdown-wrap { position: relative; }
.dropdown {
  position: absolute; z-index: 99; top: calc(100% + 4px); left: 0; right: 0;
  background: #fff; border: 1px solid #e5e5e5; border-radius: 8px;
  max-height: 200px; overflow-y: auto;
  box-shadow: 0 8px 24px rgba(0,0,0,0.1); display: none;
}
.dropdown.open { display: block; }
.dropdown-item { padding: 10px 14px; cursor: pointer; font-size: 13px; border-bottom: 1px solid #f5f5f5; }
.dropdown-item:last-child { border-bottom: none; }
.dropdown-item:hover { background: #f5f5f5; }

#export-btn {
  width: 100%; margin-top: auto; padding-top: 20px;
}
#export-btn button {
  width: 100%; padding: 13px 0; background: #000; color: #fff;
  border: none; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; transition: background .15s;
}
#export-btn button:hover { background: #222; }

#preview { flex: 1; display: flex; align-items: center; justify-content: center; padding: 32px; background: #e8eaed; }
#canvas-wrap { box-shadow: 0 12px 48px rgba(0,0,0,0.18); border-radius: 12px; overflow: hidden; max-width: 560px; width: 100%; }
canvas { width: 100%; display: block; }

@media (max-width: 700px) {
  body { flex-direction: column; }
  #sidebar { width: 100%; border-right: none; border-bottom: 1px solid #e5e5e5; max-height: 55vh; }
  #preview { padding: 16px; min-height: 45vw; }
}
</style>
</head>
<body>

<div id="sidebar">
  <div class="app-title">🎨 Mindbox Creative Builder</div>

  <div class="mode-btns">
    <button class="mode-btn active" onclick="setMode('case')">Кейс</button>
    <button class="mode-btn" onclick="setMode('vacancies')">Вакансии</button>
  </div>

  <div id="case-fields">
    <div class="field">
      <label>Компания-клиент</label>
      <div class="dropdown-wrap">
        <input type="text" id="company-search" placeholder="Поиск компании..."
          oninput="filterCompanies()" onfocus="openDrop('company-drop')" onblur="closeDrop('company-drop')" autocomplete="off">
        <div class="dropdown" id="company-drop"></div>
      </div>
    </div>
    <div class="field">
      <label>Цвет фона</label>
      <div class="color-row">
        <input type="color" id="bg-color" value="#E8344E" oninput="syncColor(this.value)">
        <div class="color-dot active" style="background:#E8344E" onclick="setColor('#E8344E')"></div>
        <div class="color-dot" style="background:#00A99D" onclick="setColor('#00A99D')"></div>
        <div class="color-dot" style="background:#2E7D32" onclick="setColor('#2E7D32')"></div>
        <div class="color-dot" style="background:#2D3E4E" onclick="setColor('#2D3E4E')"></div>
        <div class="color-dot" style="background:#F4A462" onclick="setColor('#F4A462')"></div>
        <div class="color-dot" style="background:#0066FF" onclick="setColor('#0066FF')"></div>
      </div>
    </div>
    <div class="field">
      <label>Заголовок</label>
      <textarea id="case-title" rows="3" oninput="redraw()">«Альпина» экспериментирует с балльными механиками</textarea>
    </div>
    <div class="field">
      <label>Подпись к метрике</label>
      <input type="text" id="metric-label" value="к выручке CRM-канала" oninput="redraw()">
    </div>
    <div class="field">
      <label>Метрика</label>
      <input type="text" id="metric-value" value="+14,4%" oninput="redraw()">
    </div>
    <div class="field">
      <label>Тег</label>
      <select id="case-tag" onchange="redraw()">
        <option>кейс</option>
        <option>вакансии и резюме</option>
        <option>обзор</option>
        <option>исследование</option>
      </select>
    </div>
  </div>

  <div id="vac-fields" style="display:none">
    <div class="field">
      <label>Заголовок</label>
      <textarea id="vac-title" rows="2" oninput="redraw()">Компании, которые ищут специалистов в CRM</textarea>
    </div>
    <div class="field">
      <label>Тег</label>
      <select id="vac-tag" onchange="redraw()">
        <option>вакансии и резюме</option>
        <option>кейс</option>
        <option>обзор</option>
        <option>исследование</option>
      </select>
    </div>
    <div class="field">
      <label id="vac-count-label">Компании (0)</label>
      <div class="tags-wrap" id="vac-chips"></div>
      <div class="dropdown-wrap">
        <input type="text" id="vac-search" placeholder="+ Добавить компанию..."
          oninput="filterVac()" onfocus="openDrop('vac-drop')" onblur="closeDrop('vac-drop')" autocomplete="off">
        <div class="dropdown" id="vac-drop"></div>
      </div>
    </div>
  </div>

  <div id="export-btn"><button onclick="exportPNG()">↓ Скачать PNG 1080×1080</button></div>
</div>

<div id="preview">
  <div id="canvas-wrap"><canvas id="c"></canvas></div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────
const COMPANIES = [
  { id:"alpina",     name:"Альпина книги",   logoText:"альпина",       logoStyle:"pill-red" },
  { id:"befree",     name:"Befree",          logoText:"Befree",         logoStyle:"text-bold-black" },
  { id:"a101",       name:"А101",            logoText:"А101",           logoStyle:"circle-red" },
  { id:"emka",       name:"ЕМКА",            logoText:"ЕМКА",           logoStyle:"text-light-black" },
  { id:"farmako",    name:"Фармакопейка",    logoText:"фармакопейка",   logoStyle:"text-green" },
  { id:"sync",       name:"Синхронизация",   logoText:"синхро\nнизация",logoStyle:"text-bold-black" },
  { id:"granel",     name:"Гранель",         logoText:"ГРАНЕЛЬ",        logoStyle:"text-red" },
  { id:"unirest",    name:"Unirest",         logoText:"unirest",        logoStyle:"text-red" },
  { id:"yango",      name:"Яндекс Go",       logoText:"Яндекс Go",      logoStyle:"text-bold-black" },
  { id:"rustore",    name:"RuStore",         logoText:"RuStore",        logoStyle:"text-blue" },
  { id:"rostelecom", name:"Ростелеком",      logoText:"Ростелеком",     logoStyle:"text-purple" },
  { id:"bork",       name:"BORK",            logoText:"BORK",           logoStyle:"text-bold-black" },
  { id:"invitro",    name:"INVITRO",         logoText:"INVITRO",        logoStyle:"text-cyan" },
  { id:"sunlight",   name:"Sunlight",        logoText:"SUNLIGHT",       logoStyle:"text-red" },
  { id:"ural",       name:"Ural Airlines",   logoText:"URAL\nAIRLINES", logoStyle:"text-darkred" },
  { id:"umskul",     name:"Умскул",          logoText:"Умскул",         logoStyle:"text-orange" },
  { id:"pari",       name:"PARI",            logoText:"PARI",           logoStyle:"text-bold-black" },
  { id:"crmlove",    name:"CRMLOVE",         logoText:"CRMLOVE",        logoStyle:"text-bold-black" },
  { id:"kimex",      name:"KIMEX MANGO",     logoText:"KIMEX\nMANGO",   logoStyle:"text-bold-black" },
  { id:"tennisi",    name:"Tennisi bet",     logoText:"TENNISI bet",    logoStyle:"text-red" },
  { id:"stool",      name:"Stool Group",     logoText:"Stool Group",    logoStyle:"text-bold-black" },
  { id:"geltek",     name:"GELTEK",          logoText:"GELTEK",         logoStyle:"text-bold-black" },
  { id:"simulative", name:"Simulative",      logoText:"Simulative",     logoStyle:"text-bold-black" },
];

const TAG_OPTIONS = ["кейс","вакансии и резюме","обзор","исследование"];
const LIGHT_BG = "#E8EEF2"; // left panel
const S = 1080; // canvas size

let mode = "case";
let selectedCompany = COMPANIES[0];
let vacCompanies = [COMPANIES[0], COMPANIES[1], COMPANIES[2], COMPANIES[3]];
let bgColor = "#E8344E";

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
canvas.width = S; canvas.height = S;

// ─── HELPERS ────────────────────────────────────────────────────────────────
function luminance(hex) {
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  const toL = c => c <= 0.03928 ? c/12.92 : Math.pow((c+0.055)/1.055, 2.4);
  return 0.2126*toL(r) + 0.7152*toL(g) + 0.0722*toL(b);
}
function isLight(hex) { return luminance(hex) > 0.35; }
function textColor(hex) { return isLight(hex) ? "#1a1a1a" : "#ffffff"; }

function rr(x, y, w, h, r) {
  ctx.beginPath(); ctx.roundRect(x, y, w, h, r);
}

function wrapText(text, maxW, font) {
  ctx.font = font;
  const words = text.split(" ");
  let line = "", lines = [];
  for (const w of words) {
    const test = line ? line + " " + w : w;
    if (ctx.measureText(test).width > maxW) { if (line) lines.push(line); line = w; }
    else line = test;
  }
  if (line) lines.push(line);
  return lines;
}

// ─── DRAW LOGO ───────────────────────────────────────────────────────────────
function drawLogo(company, x, y, w, h) {
  const s = company.logoStyle;
  const txt = company.logoText;
  ctx.save();

  const colorMap = {
    "text-bold-black": "#000",
    "text-light-black": "#000",
    "text-red": "#E8344E",
    "text-green": "#1B6B2F",
    "text-blue": "#0066FF",
    "text-purple": "#8B2FC9",
    "text-cyan": "#00BCD4",
    "text-darkred": "#8B0000",
    "text-orange": "#FF6B00",
  };

  if (s === "circle-red") {
    const r = Math.min(w, h) * 0.36;
    ctx.fillStyle = "#E8344E";
    ctx.beginPath(); ctx.arc(x+w/2, y+h/2, r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.font = `bold ${r*0.65}px Arial`;
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(txt, x+w/2, y+h/2);

  } else if (s === "pill-red") {
    const ph = h * 0.42, pw = w * 0.75;
    const px = x+(w-pw)/2, py = y+(h-ph)/2;
    ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.roundRect(px, py, pw, ph, ph/2); ctx.fill();
    ctx.fillStyle = "#E8344E";
    ctx.font = `600 ${ph*0.48}px Arial`;
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(txt, x+w/2, y+h/2);

  } else {
    ctx.fillStyle = colorMap[s] || "#000";
    const lines = txt.split("\n");
    const weight = s === "text-bold-black" ? "bold" : s === "text-light-black" ? "300" : "600";
    const fontSize = Math.min(w * 0.2, (h * 0.55) / lines.length);
    ctx.font = `${weight} ${fontSize}px Arial`;
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    const lineH = fontSize * 1.25;
    const totalH = lines.length * lineH;
    lines.forEach((l, i) => {
      ctx.fillText(l, x+w/2, y+h/2 - totalH/2 + i*lineH + lineH/2);
    });
  }
  ctx.restore();
}

// ─── MINDBOX LOGO ────────────────────────────────────────────────────────────
function drawMindboxLogo(x, y, color) {
  ctx.save();
  ctx.fillStyle = color || "#000";
  ctx.font = "600 52px Arial";
  ctx.textAlign = "left"; ctx.textBaseline = "top";
  ctx.fillText("mindbox", x, y);
  ctx.restore();
}

// ─── TAG PILL ────────────────────────────────────────────────────────────────
// style: "outline" (white border, transparent fill) or "filled" (white fill, dark text)
function drawTag(text, x, y, style, textCol) {
  ctx.save();
  ctx.font = "500 30px Arial";
  const tw = ctx.measureText(text).width;
  const ph = 52, pw = tw + 52, r = ph/2;

  if (style === "outline") {
    ctx.strokeStyle = textCol || "#fff";
    ctx.lineWidth = 2.5;
    rr(x, y, pw, ph, r); ctx.stroke();
    ctx.fillStyle = textCol || "#fff";
  } else {
    // filled white
    ctx.fillStyle = "rgba(255,255,255,0.18)";
    rr(x, y, pw, ph, r); ctx.fill();
    ctx.fillStyle = "#fff";
    ctx.strokeStyle = "rgba(255,255,255,0.5)";
    ctx.lineWidth = 1.5;
    rr(x, y, pw, ph, r); ctx.stroke();
    ctx.fillStyle = textCol || "#fff";
  }

  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(text, x + pw/2, y + ph/2);
  ctx.restore();
  return pw; // return width for right-align
}

// ─── TEMPLATE: CASE ──────────────────────────────────────────────────────────
function drawCase() {
  const title = document.getElementById("case-title").value;
  const metricLabel = document.getElementById("metric-label").value;
  const metricValue = document.getElementById("metric-value").value;
  const tag = document.getElementById("case-tag").value;
  const tc = textColor(bgColor); // auto text color based on bg

  canvas.width = S; canvas.height = S;

  // Panels
  const leftW = Math.round(S * 0.305); // ~330px
  ctx.fillStyle = LIGHT_BG;
  ctx.fillRect(0, 0, leftW, S);
  ctx.fillStyle = bgColor;
  ctx.fillRect(leftW, 0, S - leftW, S);

  // ── LEFT PANEL ──
  const lPad = 52;

  // Mindbox logo — top left of left panel
  drawMindboxLogo(lPad, 56, "#000");

  // Client logo — below mindbox, centered in left panel with padding
  const logoAreaY = 160;
  const logoAreaH = 140;
  const logoAreaW = leftW - lPad * 2;
  drawLogo(selectedCompany, lPad, logoAreaY, logoAreaW, logoAreaH);

  // Tag pill — bottom left
  const tagY = S - 52 - 52; // 52px from bottom, pill height 52
  drawTag(tag, lPad, tagY, "outline", "#000");

  // ── RIGHT PANEL ──
  const rPad = 56;
  const rX = leftW + rPad;
  const rMaxW = S - leftW - rPad * 2;

  // Title — top of right panel
  const titleFont = `bold 80px Arial`;
  const titleLines = wrapText(title, rMaxW, titleFont);
  ctx.fillStyle = tc;
  ctx.font = titleFont;
  ctx.textAlign = "left"; ctx.textBaseline = "top";
  const titleLineH = 92;
  const titleY = 60;
  titleLines.forEach((l, i) => ctx.fillText(l, rX, titleY + i * titleLineH));

  // Metric label — above metric, sits ~72% down
  const metricLabelY = S * 0.705;
  if (metricLabel) {
    ctx.fillStyle = tc;
    ctx.globalAlpha = 0.7;
    ctx.font = "400 38px Arial";
    ctx.textAlign = "left"; ctx.textBaseline = "top";
    ctx.fillText(metricLabel, rX, metricLabelY);
    ctx.globalAlpha = 1;
  }

  // Metric value — big number
  if (metricValue) {
    ctx.fillStyle = tc;
    ctx.font = `bold 164px Arial`;
    ctx.textAlign = "left"; ctx.textBaseline = "top";
    ctx.fillText(metricValue, leftW + rPad - 8, metricLabelY + 52);
  }
}

// ─── TEMPLATE: VACANCIES ─────────────────────────────────────────────────────
function drawVacancies() {
  const title = document.getElementById("vac-title").value;
  const tag = document.getElementById("vac-tag").value;
  const companies = vacCompanies;

  canvas.width = S; canvas.height = S;

  ctx.fillStyle = LIGHT_BG;
  ctx.fillRect(0, 0, S, S);

  const pad = 56;

  // Mindbox logo — top left
  drawMindboxLogo(pad, 56, "#000");

  // Tag pill — top right (right-aligned)
  ctx.font = "500 30px Arial";
  const tw = ctx.measureText(tag).width;
  const tagPW = tw + 52;
  const tagX = S - pad - tagPW;
  // outline style on light bg means dark border
  ctx.save();
  ctx.strokeStyle = "#000";
  ctx.lineWidth = 2;
  rr(tagX, 52, tagPW, 52, 26); ctx.stroke();
  ctx.fillStyle = "#000";
  ctx.font = "500 30px Arial";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(tag, tagX + tagPW/2, 52 + 26);
  ctx.restore();

  // Title
  ctx.fillStyle = "#000";
  const titleFont = "bold 74px Arial";
  const titleLines = wrapText(title, S - pad*2, titleFont);
  ctx.font = titleFont;
  ctx.textAlign = "left"; ctx.textBaseline = "top";
  const titleY = 148;
  titleLines.forEach((l, i) => ctx.fillText(l, pad, titleY + i * 86));

  // Logo grid
  const n = companies.length;
  if (!n) return;

  const cols = n <= 2 ? 1 : n <= 4 ? 2 : 3;
  const rows = Math.ceil(n / cols);
  const gap = 18;
  const gridY = titleY + titleLines.length * 86 + 40;
  const gridH = S - gridY - pad;
  const gridW = S - pad * 2;
  const cardW = (gridW - gap * (cols - 1)) / cols;
  const cardH = Math.min((gridH - gap * (rows - 1)) / rows, 210);

  companies.forEach((company, i) => {
    const col = i % cols, row = Math.floor(i / cols);
    const cx = pad + col * (cardW + gap);
    const cy = gridY + row * (cardH + gap);
    ctx.fillStyle = "#fff";
    rr(cx, cy, cardW, cardH, 22); ctx.fill();
    const lPad = 28;
    drawLogo(company, cx + lPad, cy + lPad, cardW - lPad*2, cardH - lPad*2);
  });
}

// ─── REDRAW ──────────────────────────────────────────────────────────────────
function redraw() {
  if (mode === "case") drawCase();
  else drawVacancies();
}

// ─── MODE ─────────────────────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.getElementById("case-fields").style.display = m === "case" ? "block" : "none";
  document.getElementById("vac-fields").style.display  = m === "vacancies" ? "block" : "none";
  document.querySelectorAll(".mode-btn").forEach((b, i) => {
    b.classList.toggle("active", (i===0 && m==="case") || (i===1 && m==="vacancies"));
  });
  redraw();
}

// ─── COLOR ───────────────────────────────────────────────────────────────────
function syncColor(c) { bgColor = c; updateDots(); redraw(); }
function setColor(c) {
  bgColor = c;
  document.getElementById("bg-color").value = c;
  updateDots(); redraw();
}
function updateDots() {
  document.querySelectorAll(".color-dot").forEach(d => {
    const dc = d.style.background || d.style.backgroundColor;
    d.classList.toggle("active", dc === bgColor);
  });
}

// ─── COMPANY DROPDOWN ────────────────────────────────────────────────────────
function buildCompanyDrop() {
  const q = document.getElementById("company-search").value.toLowerCase();
  const drop = document.getElementById("company-drop");
  drop.innerHTML = "";
  COMPANIES.filter(c => c.name.toLowerCase().includes(q)).forEach(c => {
    const d = document.createElement("div");
    d.className = "dropdown-item"; d.textContent = c.name;
    d.onmousedown = () => {
      selectedCompany = c;
      document.getElementById("company-search").value = c.name;
      drop.classList.remove("open"); redraw();
    };
    drop.appendChild(d);
  });
}
function filterCompanies() { buildCompanyDrop(); document.getElementById("company-drop").classList.add("open"); }
function openDrop(id) {
  if (id === "company-drop") buildCompanyDrop();
  if (id === "vac-drop") buildVacDrop();
  document.getElementById(id).classList.add("open");
}
function closeDrop(id) { setTimeout(() => document.getElementById(id).classList.remove("open"), 200); }

// ─── VAC COMPANIES ───────────────────────────────────────────────────────────
function buildVacDrop() {
  const q = document.getElementById("vac-search").value.toLowerCase();
  const drop = document.getElementById("vac-drop");
  drop.innerHTML = "";
  COMPANIES.filter(c => c.name.toLowerCase().includes(q) && !vacCompanies.find(v => v.id === c.id))
    .forEach(c => {
      const d = document.createElement("div");
      d.className = "dropdown-item"; d.textContent = c.name;
      d.onmousedown = () => {
        vacCompanies.push(c);
        document.getElementById("vac-search").value = "";
        renderChips(); drop.classList.remove("open"); redraw();
      };
      drop.appendChild(d);
    });
}
function filterVac() { buildVacDrop(); document.getElementById("vac-drop").classList.add("open"); }
function renderChips() {
  const wrap = document.getElementById("vac-chips");
  wrap.innerHTML = "";
  vacCompanies.forEach(c => {
    const chip = document.createElement("div"); chip.className = "tag-chip";
    chip.innerHTML = `${c.name}<span class="rm" onclick="removeVac('${c.id}')">×</span>`;
    wrap.appendChild(chip);
  });
  document.getElementById("vac-count-label").textContent = `Компании (${vacCompanies.length})`;
}
function removeVac(id) {
  vacCompanies = vacCompanies.filter(c => c.id !== id);
  renderChips(); redraw();
}

// ─── EXPORT ──────────────────────────────────────────────────────────────────
function exportPNG() {
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `mindbox-${mode}-1080x1080.png`;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }, "image/png");
}

// ─── INIT ────────────────────────────────────────────────────────────────────
document.getElementById("company-search").value = selectedCompany.name;
renderChips();
redraw();
</script>
